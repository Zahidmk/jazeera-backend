# ─────────────────────────────────────────────────────────────────────────────
# Nginx Configuration — Jazeera API + Dashboard
# Copy to /etc/nginx/sites-available/jazeera
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate Limiting Zones ───────────────────────────────────────────────────────
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

# ── Backend API — api.jazeera.com ─────────────────────────────────────────────
server {
    listen 80;
    server_name api.jazeera.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.jazeera.com;

    # ── SSL (managed by Certbot) ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/api.jazeera.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jazeera.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"              always;
    add_header X-Content-Type-Options    "nosniff"           always;
    add_header X-XSS-Protection          "1; mode=block"     always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Permissions-Policy        "geolocation=(), microphone=()" always;

    # ── Gzip Compression ──────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Static Uploads ────────────────────────────────────────────────────────
    location /uploads/ {
        alias /var/www/jazeera-backend/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Auth Endpoints — strict rate limit ───────────────────────────────────
    location /api/v1/auth {
        limit_req zone=auth_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Webhook Endpoint — moderate rate limit ────────────────────────────────
    location /api/v1/sync/webhook {
        limit_req zone=webhook_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3000;
        include /etc/nginx/proxy_params;
    }

    # ── Block hidden files ────────────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}

# ── Dashboard — dashboard.jazeera.com ────────────────────────────────────────
server {
    listen 80;
    server_name dashboard.jazeera.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dashboard.jazeera.com;

    ssl_certificate     /etc/letsencrypt/live/api.jazeera.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.jazeera.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options        "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"            always;
    add_header X-XSS-Protection       "1; mode=block"      always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Option A: PM2 SSR on port 3001
    location / {
        proxy_pass http://127.0.0.1:3001;
        include /etc/nginx/proxy_params;
    }

    # Option B (static export): uncomment these and comment out proxy_pass above
    # root /var/www/jazeera-dashboard/.next/;
    # try_files $uri $uri/ /index.html;

    location ~ /\. {
        deny all;
    }
}
